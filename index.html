<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>NeuroVida</title>

<meta name="theme-color" content="#8b7cff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NeuroVida">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#8b7cff,#6c63ff);
  height:100dvh;
  display:flex;
  flex-direction:column;
}

.app{
  display:flex;
  flex-direction:column;
  height:100%;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  color:white;
}

.logo{
  font-size:22px;
  font-weight:700;
}

.logo span{
  color:#2ecc71;
}

/* CHAT */
#chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
  background:white;
}

/* MENSAGENS */
.msg{
  max-width:80%;
  padding:12px;
  border-radius:18px;
  margin:6px 0;
  animation:subir .2s ease;
}

@keyframes subir{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}

.bot{background:#eee;}
.user{
  background:#8b7cff;
  color:white;
  margin-left:auto;
}

/* INPUT */
form{
  display:flex;
  padding:10px;
  background:white;
  position:sticky;
  bottom:0;
}

input{
  flex:1;
  border:none;
  padding:14px;
  border-radius:25px;
  background:#f1f1f1;
  font-size:16px;
}

button{
  margin-left:8px;
  width:50px;
  border:none;
  border-radius:50%;
  background:#2ecc71;
  color:white;
  font-size:18px;
}

button:active{
  transform:scale(.9);
}

/* INSTALAR */
.install{
  position:fixed;
  bottom:80px;
  left:10px;
  right:10px;
  background:#000;
  color:#fff;
  padding:12px;
  border-radius:12px;
  text-align:center;
  display:none;
}
</style>
</head>

<body>

<div class="app">

<header>
  <div class="logo">neuro<span>vida</span></div>
  <small>apoio emocional inteligente</small>
</header>

<div id="chat"></div>

<form onsubmit="enviar(event)">
  <input id="input" placeholder="Digite..." autocomplete="off">
  <button type="submit">➤</button>
</form>

</div>

<div class="install" id="installBox">
Adicionar à tela inicial 📱 <br>
Safari → compartilhar → "Tela de Início"
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMsg(texto, lado){
  const div = document.createElement("div");
  div.className = "msg " + lado;
  div.innerHTML = texto;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function IA(texto){
  const t = texto.toLowerCase();

  if(t.includes("oi")) return "😊 Oi! Como você está?";
  if(t.includes("triste")) return "💜 Quer me contar o que está acontecendo?";
  if(t.includes("ansiedade")) return "💙 Respira comigo: puxa o ar... solta devagar.";

  return "Estou aqui com você 💜";
}

function enviar(e){
  e.preventDefault();
  const texto = input.value.trim();
  if(!texto) return;

  addMsg(texto,"user");
  input.value="";

  setTimeout(()=>{
    addMsg(IA(texto),"bot");
  },500);
}

/* DETECTAR WHATSAPP / IPHONE */
if(navigator.userAgent.includes("WhatsApp") || /iPhone/.test(navigator.userAgent)){
  document.getElementById("installBox").style.display="block";
}
</script>

</body>
</html>
